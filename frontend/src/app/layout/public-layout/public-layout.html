<div class="public-wrapper">
  <!-- PrimeNG Menubar -->
  <nav class="custom-navbar" *ngIf="!isAuthPage">
    <div class="nav-brand-centered" routerLink="/" tabindex="0">
      <span class="logo-text">Local Service Marketplace</span>
    </div>

    <div class="nav-actions-right">
      <button class="hamburger-btn" aria-label="Menu" (click)="toggleMenu()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1">
          <line x1="4" y1="8" x2="20" y2="8"></line>
          <line x1="4" y1="16" x2="20" y2="16"></line>
        </svg>
      </button>
    </div>
  </nav>

  <!-- Full Screen Menu -->
  <div class="fullscreen-menu">
    <div class="menu-header">
      <button class="close-btn" aria-label="Close Menu" (click)="toggleMenu()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1">
          <line x1="18" y1="6" x2="6" y2="18"></line>
          <line x1="6" y1="6" x2="18" y2="18"></line>
        </svg>
      </button>
    </div>
    <div class="menu-content">
      <ul class="menu-links">
        <li><a routerLink="/" (click)="toggleMenu()" tabindex="0">Home</a></li>
        <li><a routerLink="/signup" (click)="toggleMenu()" tabindex="0">Join as a Professional</a></li>
        <li><a routerLink="/login" (click)="toggleMenu()" tabindex="0">Sign In</a></li>
        <li><a routerLink="/about" (click)="toggleMenu()" tabindex="0">Categories</a></li>
      </ul>
    </div>
  </div>

  <!-- Page Content -->
  <main class="public-content">
    <router-outlet></router-outlet>
  </main>

  <footer class="site-footer" *ngIf="!isAuthPage">
    <div class="footer-hero">
      <h1 class="hero-text">Local Service Marketplace</h1>
    </div>
  </footer>
</div>
