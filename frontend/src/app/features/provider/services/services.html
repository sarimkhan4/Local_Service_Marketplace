<p-toast></p-toast>
<div class="customer-page provider-services">
  <header class="provider-services__header">
    <div>
      <h1 class="customer-page__title">Service configuration</h1>
      <p class="customer-page__subtitle">Choose catalog services you offer and set your rates.</p>
    </div>
    <div class="provider-services__actions">
      <p-button label="Add custom service" icon="pi pi-plus" (click)="showNewServiceDialog()" [outlined]="true"></p-button>
      <span class="provider-services__badge">{{ activeCount }} selected</span>
      <p-button label="Save configuration" icon="pi pi-save" (click)="saveConfiguration()"></p-button>
    </div>
  </header>

  <section class="provider-services__table-shell" aria-label="Services catalog">
    <p-table
      [value]="allViewModels"
      sortField="categoryName"
      sortMode="single"
      rowGroupMode="subheader"
      groupRowsBy="categoryName"
      [scrollable]="true"
      scrollHeight="75vh"
      styleClass="p-datatable-striped provider-services-table">
      <ng-template pTemplate="header">
        <tr>
          <th scope="col" style="width: 5rem" class="text-center">Offer</th>
          <th scope="col" style="min-width: 250px">Service</th>
          <th scope="col" style="width: 16rem" class="text-center">Your price</th>
        </tr>
      </ng-template>
      <ng-template pTemplate="groupheader" let-svc>
        <tr pRowGroupHeader>
          <td colspan="3" class="provider-services__group-cell">
            <div class="provider-services__group-inner">
              <i class="pi pi-folder-open" aria-hidden="true"></i>
              <span>{{ svc.categoryName }}</span>
            </div>
          </td>
        </tr>
      </ng-template>
      <ng-template pTemplate="body" let-svc>
        <tr>
          <td class="text-center">
            <p-checkbox [(ngModel)]="svc.isOffered" [binary]="true"></p-checkbox>
          </td>
          <td>
            <div class="provider-services__desc">
              <span class="provider-services__title" [class.provider-services__title--on]="svc.isOffered">{{ svc.title }}</span>
              <span class="provider-services__text">{{ svc.description }}</span>
            </div>
          </td>
          <td class="text-center">
            <p-inputNumber
              [(ngModel)]="svc.providerPrice"
              mode="currency"
              currency="USD"
              locale="en-US"
              [disabled]="!svc.isOffered"
              styleClass="w-9rem"
              [min]="0"></p-inputNumber>
          </td>
        </tr>
      </ng-template>
      <ng-template pTemplate="emptymessage">
        <tr>
          <td colspan="3" class="provider-services__empty">No services found in the catalog.</td>
        </tr>
      </ng-template>
    </p-table>
  </section>
</div>

<p-dialog
  header="Create custom service"
  [(visible)]="displayNewServiceDialog"
  [modal]="true"
  [style]="{ width: '450px' }"
  [breakpoints]="{ '960px': '75vw', '640px': '100vw' }">
  <div class="provider-services-dialog">
    <div class="provider-services-field">
      <label for="cat">Category</label>
      <p-select
        [options]="categories"
        [(ngModel)]="newServiceForm.categoryId"
        optionLabel="categoryName"
        optionValue="categoryId"
        placeholder="Select category"
        inputId="cat"
        appendTo="body"></p-select>
    </div>
    <div class="provider-services-field">
      <label for="sname">Title</label>
      <input pInputText id="sname" [(ngModel)]="newServiceForm.name" placeholder="e.g. Vintage clock repair" />
    </div>
    <div class="provider-services-field">
      <label for="sdesc">Description</label>
      <textarea pTextarea id="sdesc" [(ngModel)]="newServiceForm.description" rows="3" placeholder="What this service includes"></textarea>
    </div>
    <div class="provider-services-field">
      <label for="sprice">Your price ($)</label>
      <p-inputNumber
        inputId="sprice"
        [(ngModel)]="newServiceForm.price"
        mode="currency"
        currency="USD"
        locale="en-US"
        [min]="0"></p-inputNumber>
    </div>
  </div>
  <ng-template pTemplate="footer">
    <p-button label="Cancel" icon="pi pi-times" (click)="displayNewServiceDialog = false" [text]="true" severity="secondary"></p-button>
    <p-button label="Create &amp; offer" icon="pi pi-check" (click)="saveNewService()"></p-button>
  </ng-template>
</p-dialog>
