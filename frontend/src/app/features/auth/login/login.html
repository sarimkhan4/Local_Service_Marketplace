<p-toast></p-toast>

<div class="auth-split-container">
  <!-- Left Side: Image Container -->
  <div class="auth-image-side">
    <img src="/images/electrician.jpg" alt="Professional service" onerror="this.style.display='none'">
  </div>

  <!-- Right Side: Form Container -->
  <div class="auth-form-side">
    <div class="auth-card-inner">

      <div class="auth-header">
        <div class="logo-icon mb-3 mx-auto flex justify-content-center">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" width="48" height="48">
            <path d="M12 2L2 22h20L12 2zm0 4.5l6.5 13h-13L12 6.5z" />
          </svg>
        </div>
        <h2>Welcome Back</h2>
        <p>Log in to access your dashboard</p>
      </div>

      <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="auth-form" (keydown.enter)="$event.preventDefault()">

        <!-- Email Input -->
        <div class="form-group mb-4">
          <label for="email">Email</label>
          <div class="input-wrapper" [class.has-error]="loginForm.get('email')?.errors && loginForm.get('email')?.touched">
            <i class="pi pi-envelope"></i>
            <input type="email" id="email" formControlName="email" name="email" placeholder="you@example.com"
              class="w-full custom-input" [class.error]="loginForm.get('email')?.errors && loginForm.get('email')?.touched" />
          </div>
          <small class="error-message" *ngIf="loginForm.get('email')?.errors?.['required'] && loginForm.get('email')?.touched">Email is required</small>
          <small class="error-message" *ngIf="loginForm.get('email')?.errors?.['email'] && loginForm.get('email')?.touched">Please enter a valid email</small>
        </div>

        <!-- Password Input -->
        <div class="form-group mb-4">
          <label for="password">Password</label>
          <div class="input-wrapper" [class.has-error]="loginForm.get('password')?.errors && loginForm.get('password')?.touched">
            <input type="password" id="password" formControlName="password" name="password" placeholder="••••••••"
              class="w-full custom-input" [class.error]="loginForm.get('password')?.errors && loginForm.get('password')?.touched" />
          </div>
          <small class="error-message" *ngIf="loginForm.get('password')?.errors?.['required'] && loginForm.get('password')?.touched">Password is required</small>
          <small class="error-message" *ngIf="loginForm.get('password')?.errors?.['minlength'] && loginForm.get('password')?.touched">Password must be at least 6 characters</small>
        </div>

        <!-- Form Options (Native Checkbox) -->
        <div class="form-options mb-5 flex justify-content-between align-items-center">
          <div class="flex align-items-center gap-2">
            <input type="checkbox" id="remember" formControlName="rememberMe" />
            <label for="remember" class="text-sm font-medium text-gray-600 m-0 cursor-pointer">
              Remember me
            </label>
          </div>
          <a href="#" class="forgot-link text-sm font-medium">Forgot password?</a>
        </div>

        <!-- Submit Button -->
        <button type="submit" class="w-full custom-btn btn-large" [disabled]="isLoading || loginForm.invalid">
          <span *ngIf="!isLoading">Sign In</span>
          <span *ngIf="isLoading">Signing In...</span>
        </button>
      </form>

      <div class="auth-footer">
        <p class="text-sm text-gray-600">
          Don't have an account? <a routerLink="/signup" class="font-semibold text-primary">Join Now</a>
        </p>
      </div>

    </div>
  </div>
</div>
