<p-toast></p-toast>

<div class="auth-split-container">
  <!-- Left Side: Image Container -->
  <div class="auth-image-side">
    <img src="images/electrician.jpg" alt="Professional service">
  </div>

  <!-- Right Side: Form Container -->
  <div class="auth-form-side">
    <div class="auth-card-inner">

      <div class="auth-header">
        <div class="logo-icon mb-3 mx-auto flex justify-content-center">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" width="48" height="48">
            <path d="M12 2L2 22h20L12 2zm0 4.5l6.5 13h-13L12 6.5z" />
          </svg>
        </div>
        <h2>Welcome Back</h2>
        <p>Log in to access your dashboard</p>
      </div>

      <form (ngSubmit)="onSubmit()" class="auth-form">

        <!-- Email Input -->
        <div class="form-group mb-4">
          <label for="email">Email</label>
          <div class="input-wrapper" [class.has-error]="validationErrors.email">
            <i class="pi pi-envelope"></i>
            <input type="email" id="email" [(ngModel)]="email" name="email" placeholder="you@example.com"
              class="w-full custom-input" [class.error]="validationErrors.email" required />
          </div>
          <small class="error-message" *ngIf="validationErrors.email">{{ validationErrors.email }}</small>
        </div>

        <!-- Password Input -->
        <div class="form-group mb-4">
          <label for="password">Password</label>
          <div class="input-wrapper" [class.has-error]="validationErrors.password">
            <input type="password" id="password" [(ngModel)]="password" name="password" placeholder="••••••••"
              class="w-full custom-input" [class.error]="validationErrors.password" required />
          </div>
          <small class="error-message" *ngIf="validationErrors.password">{{ validationErrors.password }}</small>
        </div>

        <!-- Form Options (Native Checkbox) -->
        <div class="form-options mb-5 flex justify-content-between align-items-center">
          <div class="flex align-items-center gap-2">
            <input type="checkbox" id="remember" name="remember" [(ngModel)]="rememberMe" />
            <label for="remember" class="text-sm font-medium text-gray-600 m-0 cursor-pointer">
              Remember me
            </label>
          </div>
          <a href="#" class="forgot-link text-sm font-medium">Forgot password?</a>
        </div>

        <!-- Submit Button -->
        <button type="submit" class="w-full custom-btn btn-large" [disabled]="isLoading">
          <span *ngIf="!isLoading">Sign In</span>
          <span *ngIf="isLoading">Signing In...</span>
        </button>
      </form>

      <div class="auth-footer">
        <p class="text-sm text-gray-600">
          Don't have an account? <a routerLink="/signup" class="font-semibold text-primary">Join Now</a>
        </p>
      </div>

    </div>
  </div>
</div>
